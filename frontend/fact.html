<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Факт цеха</title>
    <link rel="stylesheet" href="css/fact.css" />
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 4px;
      "
    >
      <h1>📋 Факт цеха</h1>
      <button class="logout-btn" onclick="doLogout()">Выход</button>
    </div>
    <h2 id="narad-label">Наряд: —</h2>

    <div id="content">
      <div class="loading">Загрузка...</div>
    </div>

    <script>
      // Получаем номер наряда из URL
      var params = new URLSearchParams(window.location.search);
      var NARAD = params.get("narad") || "";
      var TOKEN = localStorage.getItem("cir_fact_token") || "";
      var USER = null;

      document.getElementById("narad-label").innerHTML =
        'Наряд: <b style="color:#3b82f6">' + NARAD + "</b>";

      // ── HTTP ──────────────────────────────────────────────
      function api(method, url, data) {
        return new Promise(function (resolve) {
          var xhr = new XMLHttpRequest();
          xhr.open(method, url, true);
          xhr.setRequestHeader("Content-Type", "application/json");
          if (TOKEN) xhr.setRequestHeader("Authorization", "Bearer " + TOKEN);
          xhr.onload = function () {
            try {
              resolve(JSON.parse(xhr.responseText));
            } catch (e) {
              resolve({ ok: false, error: xhr.responseText.slice(0, 80) });
            }
          };
          xhr.onerror = function () {
            resolve({ ok: false, error: "Нет связи с сервером" });
          };
          xhr.send(data ? JSON.stringify(data) : null);
        });
      }

      // ── АВТОРИЗАЦИЯ ───────────────────────────────────────
      function init() {
        if (TOKEN) {
          loadNarad();
          return;
        }
        showLogin();
      }

      function showLogin() {
        document.getElementById("content").innerHTML =
          '<div class="card">' +
          '<div class="card-title">Авторизация</div>' +
          "<label>Email</label>" +
          '<input type="email" id="auth-email" placeholder="email@cir.ru" autocomplete="email">' +
          "<label>Пароль</label>" +
          '<input type="password" id="auth-pass" placeholder="Пароль" autocomplete="current-password">' +
          '<div class="btn-row" style="grid-template-columns:1fr;margin-top:16px">' +
          '<button class="btn btn-blue" onclick="doLogin()">Войти</button>' +
          "</div>" +
          '<div class="msg msg-err" id="auth-err"></div>' +
          "</div>";

        // Enter для отправки
        setTimeout(function () {
          var pass = document.getElementById("auth-pass");
          if (pass)
            pass.addEventListener("keydown", function (e) {
              if (e.key === "Enter") doLogin();
            });
        }, 100);
      }

      function doLogin() {
        var email = document.getElementById("auth-email").value.trim();
        var pass = document.getElementById("auth-pass").value;
        var errEl = document.getElementById("auth-err");
        errEl.classList.remove("show");

        if (!email || !pass) {
          errEl.textContent = "Заполните email и пароль";
          errEl.classList.add("show");
          return;
        }

        api("POST", "/api/auth/login", { email: email, password: pass }).then(
          function (r) {
            if (r.ok) {
              TOKEN = r.token;
              USER = r.user;
              localStorage.setItem("cir_fact_token", TOKEN);
              localStorage.setItem("cir_fact_user", JSON.stringify(USER));
              loadNarad();
            } else {
              errEl.textContent = r.error || "Неверный email или пароль";
              errEl.classList.add("show");
            }
          },
        );
      }

      function doLogout() {
        TOKEN = "";
        USER = null;
        localStorage.removeItem("cir_fact_token");
        localStorage.removeItem("cir_fact_user");
        showLogin();
      }

      // ── ЗАГРУЗКА НАРЯДА ───────────────────────────────────
      function loadNarad() {
        if (!NARAD) {
          document.getElementById("content").innerHTML =
            '<div class="card" style="text-align:center;color:#ef4444">Не указан номер наряда в URL</div>';
          return;
        }

        try {
          USER = JSON.parse(localStorage.getItem("cir_fact_user") || "null");
        } catch (e) {}

        document.getElementById("content").innerHTML =
          '<div class="loading">Загрузка наряда ' + NARAD + "...</div>";

        api(
          "GET",
          "/api/production?q=" +
            encodeURIComponent(NARAD) +
            "&view=operations&limit=200",
        ).then(function (res) {
          if (!res.ok || !res.rows || !res.rows.length) {
            if (res.error && res.error.indexOf("Токен") !== -1) {
              TOKEN = "";
              localStorage.removeItem("cir_fact_token");
              showLogin();
              return;
            }
            document.getElementById("content").innerHTML =
              '<div class="card" style="text-align:center;color:#ef4444;padding:20px">Наряд ' +
              NARAD +
              " не найден</div>";
            return;
          }

          var rows = res.rows;
          var r = rows[0];
          var userName = USER ? USER.name : "";

          // Информация о наряде
          var html =
            '<div class="card">' +
            '<div class="card-title">Информация о наряде</div>' +
            '<div class="info-row"><span class="info-label">Изделие</span><span class="info-val">' +
            (r.product_name || "—") +
            "</span></div>" +
            '<div class="info-row"><span class="info-label">Чертёж</span><span class="info-val">' +
            (r.classifier_code || "—") +
            "</span></div>" +
            '<div class="info-row"><span class="info-label">Заказ</span><span class="info-val">' +
            (r.order_number || "—") +
            "</span></div>" +
            '<div class="info-row"><span class="info-label">Заказчик</span><span class="info-val">' +
            (r.customer || "—") +
            "</span></div>" +
            '<div class="info-row"><span class="info-label">Кол-во</span><span class="info-val">' +
            (r.quantity || 1) +
            " шт.</span></div>" +
            '<div class="info-row"><span class="info-label">Статус</span><span class="info-val">' +
            (r.status || "Новый") +
            "</span></div>" +
            (userName
              ? '<div class="info-row"><span class="info-label">Мастер</span><span class="info-val">' +
                userName +
                "</span></div>"
              : "") +
            "</div>";

          // Список операций с прогрессом
          html +=
            '<div class="card">' +
            '<div class="card-title">Операции (' +
            rows.length +
            ")</div>";

          rows.forEach(function (op) {
            var isDone = op.status === "✅ Готово";
            var statusIcon = isDone
              ? "✅"
              : op.status === "🔄 В работе"
                ? "🔄"
                : "⬜";
            var bg = isDone ? "rgba(16,185,129,0.08)" : "";
            html +=
              '<div style="padding:6px 0;border-bottom:1px solid #2d3748;font-size:12px;background:' +
              bg +
              ';padding:6px;border-radius:4px;margin-bottom:2px">' +
              '<span style="color:#f59e0b;font-weight:700;font-family:monospace">' +
              (op.operation_number || "") +
              "</span> " +
              '<span style="color:#34d399">' +
              (op.operation_name || "") +
              "</span> " +
              '<span class="op-status">' +
              statusIcon +
              "</span>" +
              (op.ready > 0
                ? ' <span style="color:#94a3b8;font-size:10px">(' +
                  op.ready +
                  "/" +
                  (op.quantity || 1) +
                  ")</span>"
                : "") +
              "</div>";
          });
          html += "</div>";

          // Форма отметки
          html +=
            '<div class="card" style="border-color:#f59e0b">' +
            '<div class="card-title" style="color:#f59e0b">📝 Отметка выполнения</div>';

          html += '<label>Операция *</label><select id="f-op">';
          rows.forEach(function (op) {
            var done = op.status === "✅ Готово" ? " ✅" : "";
            html +=
              '<option value="' +
              (op.operation_number || "") +
              '">' +
              (op.operation_number || "") +
              " — " +
              (op.operation_name || "") +
              done +
              "</option>";
          });
          html += "</select>";
          html +=
            "<label>Готовых за смену (шт.) *</label>" +
            '<input type="number" id="f-qty" value="0" min="0" inputmode="numeric" placeholder="Сколько сделали в эту смену">';

          html +=
            "<label>Затраченное время (мин)</label>" +
            '<input type="number" id="f-time" value="" min="0" inputmode="numeric" placeholder="Необязательно">';

          html +=
            "<label>Несоответствующих за смену (шт.)</label>" +
            '<input type="number" id="f-defect" value="0" min="0" inputmode="numeric">';

          html +=
            '<label>Участок *</label><select id="f-area">' +
            '<option value="">— Выберите участок —</option>';
          var areas = [
            "Заготовительный участок",
            "Испытательный центр",
            "Отдел технического контроля",
            "Сварочный участок",
            "Слесарно-сборочный участок",
            "Участок комплектации",
            "Участок обработки отверстий",
            "Участок подготовки поверхности",
            "Участок термообработки",
            "Участок токарной обработки",
            "Участок фрезерной обработки",
            "Участок фрезерных станков с ЧПУ",
            "Участок электроэрозионной обработки",
            "Аутсорсинг/Кооперация",
            "Участок токарной обработки ЦВМ",
            "Участок фрезерной обработки ЦВМ",
            "Участок фрезерных станков с ЧПУ ЦВМ",
            "Участок шлифовки ЦВМ",
            "Участок зубообработки ЦВМ",
          ];
          areas.forEach(function (a) {
            html += "<option>" + a + "</option>";
          });
          html += "</select>";

          html +=
            "<label>Комментарий</label>" +
            '<input type="text" id="f-comment" placeholder="Примечание мастера">';

          html +=
            '<div class="btn-row">' +
            '<button class="btn btn-green" onclick="send(\'Готово\')">✅ Готово</button>' +
            '<button class="btn btn-amber" onclick="send(\'Пауза\')">⏸ На паузе</button>' +
            '<button class="btn btn-blue" onclick="send(\'В работе\')">🔄 В работе</button>' +
            '<button class="btn btn-red" onclick="toggleFeedbackForm()">⚠️ Проблема</button>' +
            "</div>";

          html +=
            '<div class="msg msg-ok" id="f-ok"></div>' +
            '<div class="msg msg-err" id="f-err"></div>';
          html += "</div>";

          html += '<div class="card" id="fb-form" style="display:none;border-color:#f59e0b">' +
            '<div class="card-title" style="color:#f59e0b">💬 Сообщить о проблеме</div>' +
            '<label>Тема *</label><input type="text" id="fb-title" placeholder="Что случилось?">' +
            '<label>Описание * <span style="color:#94a3b8;font-weight:400">(минимум 10 символов)</span></label>' +
            '<textarea id="fb-desc" rows="3" style="width:100%;padding:12px;font-size:16px;background:#0f1420;border:1px solid #3a4560;border-radius:8px;color:#e2e8f0;font-family:inherit;resize:vertical" placeholder="Опишите проблему подробнее..."></textarea>' +
            '<div class="btn-row" style="grid-template-columns:1fr 1fr">' +
            '<button class="btn btn-green" onclick="submitFeedback()">📤 Отправить</button>' +
            '<button class="btn" onclick="toggleFeedbackForm()" style="background:#3a4560">✕ Отмена</button>' +
            '</div>' +
            '<div class="msg msg-ok" id="fb-ok"></div>' +
            '<div class="msg msg-err" id="fb-err"></div>' +
            '</div>';

          document.getElementById("content").innerHTML = html;
        });
      }

      // ── ОТПРАВКА ФАКТА ────────────────────────────────────
      function send(status) {
        var op = document.getElementById("f-op").value;
        var qty = document.getElementById("f-qty").value;
        var time = document.getElementById("f-time").value;
        var defects = document.getElementById("f-defect").value;
        var area = document.getElementById("f-area").value;
        var comment = document.getElementById("f-comment").value;

        var errEl = document.getElementById("f-err");
        var okEl = document.getElementById("f-ok");
        errEl.classList.remove("show");
        okEl.classList.remove("show");

        if (!op) {
          errEl.textContent = "Выберите операцию";
          errEl.classList.add("show");
          return;
        }
        if (!area) {
          errEl.textContent = "Выберите участок";
          errEl.classList.add("show");
          return;
        }

        api("POST", "/api/production/fact", {
          naradNumber: NARAD,
          operationNumber: op,
          ready: parseInt(qty) || 0,
          factMinutes: parseFloat(time) || 0,
          defects: parseInt(defects) || 0,
          workshopArea: area,
          comment: comment,
          status: status,
        }).then(function (r) {
          if (r.ok) {
            okEl.textContent =
              "✅ Операция " + op + " → " + status + " (" + r.progress + ")";
            okEl.classList.add("show");
            // Перезагружаем данные через 1.5 сек
            setTimeout(loadNarad, 1500);
          } else {
            errEl.textContent = "Ошибка: " + (r.error || "неизвестная");
            errEl.classList.add("show");
          }
        });
      }

      // ── ОБРАТНАЯ СВЯЗЬ ────────────────────────────────────
      function toggleFeedbackForm() {
        var form = document.getElementById('fb-form');
        if (!form) return;
        var shown = form.style.display !== 'none';
        form.style.display = shown ? 'none' : 'block';
        if (shown) {
          ['fb-ok','fb-err'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) { el.classList.remove('show'); el.textContent = ''; }
          });
        }
      }

      function submitFeedback() {
        var title = document.getElementById('fb-title').value.trim();
        var desc  = document.getElementById('fb-desc').value.trim();
        var errEl = document.getElementById('fb-err');
        var okEl  = document.getElementById('fb-ok');
        errEl.classList.remove('show');
        okEl.classList.remove('show');

        if (title.length < 3) {
          errEl.textContent = 'Тема: минимум 3 символа';
          errEl.classList.add('show');
          return;
        }
        if (desc.length < 10) {
          errEl.textContent = 'Описание: минимум 10 символов';
          errEl.classList.add('show');
          return;
        }

        api('POST', '/api/feedback', {
          title: title,
          description: desc,
          category: 'problem',
          priority: 'medium'
        }).then(function(r) {
          if (r.ok) {
            okEl.textContent = '✅ Обращение отправлено';
            okEl.classList.add('show');
            document.getElementById('fb-title').value = '';
            document.getElementById('fb-desc').value = '';
            setTimeout(toggleFeedbackForm, 2000);
          } else {
            errEl.textContent = 'Ошибка: ' + (r.error || 'неизвестная');
            errEl.classList.add('show');
          }
        });
      }

      // ── СТАРТ ─────────────────────────────────────────────
      init();
    </script>
  </body>
</html>
